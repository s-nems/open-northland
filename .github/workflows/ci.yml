name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Platform-independent gates run once on the cheapest runner; only `test` needs the OS matrix.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm run check:assets # reject original, decoded, or unreviewed binary assets (dependency-free)
      - run: npm ci
      - run: npm run check # biome lint + format check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build # typecheck + production Vite bundle

  test:
    # Three OSes on purpose: the sim promises byte-identical state across platforms (replays, future
    # lockstep MP), so the golden state-hash + determinism tests must run on every platform we claim
    # to support. Checkouts stay byte-identical via .gitattributes (eol=lf), so golden hashes see the
    # same bytes on Windows.
    strategy:
      # fail-fast would cancel the sibling OSes on first failure — destroying exactly the signal the
      # matrix exists for (is a golden mismatch platform-specific or universal?).
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test # builds/typechecks workspace + test sources, then runs Vitest

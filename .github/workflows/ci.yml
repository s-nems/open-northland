name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    # Three OSes on purpose: the sim promises byte-identical state across platforms (replays, future
    # lockstep MP), so the golden state-hash + determinism tests must run on every platform we claim
    # to support. Checkouts stay byte-identical via .gitattributes (eol=lf), so the Biome format gate
    # and golden hashes see the same bytes on Windows.
    strategy:
      # fail-fast would cancel the sibling OSes on first failure — destroying exactly the signal the
      # matrix exists for (is a golden mismatch platform-specific or universal?).
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm run check:assets # reject original, decoded, or unreviewed binary assets
      - run: npm ci
      - run: npm run check       # biome lint + format check
      - run: npm run build        # typecheck + production Vite bundle
      - run: npm test             # vitest: unit + integration + e2e + determinism hygiene

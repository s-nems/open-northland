name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    # Two OSes on purpose: the sim promises byte-identical state across platforms (replays, future
    # lockstep MP), so the golden state-hash + determinism tests must run on more than one platform
    # to back that promise. Windows is deliberately absent until someone can verify it locally.
    strategy:
      # fail-fast would cancel the sibling OS on first failure — destroying exactly the signal the
      # matrix exists for (is a golden mismatch platform-specific or universal?).
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check       # biome lint + format check
      - run: npm run typecheck    # tsc --build
      - run: npm test             # vitest: unit + integration + e2e + determinism hygiene

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check       # biome lint + format check
      - run: npm run typecheck    # tsc --build
      - run: npm test             # vitest: unit + integration + e2e + determinism hygiene

name: Desktop build

# Manually-dispatched installer build: run it from the Actions tab against main (optionally an
# older commit via the `commit` input). Each OS builds its own installers natively, then `publish`
# collects them into a `build-<short-sha>` prerelease — release assets are plain public download
# links, unlike workflow artifacts which require a GitHub login. There is no semver release train
# yet; the version IS the commit (0.0.0-<short-sha>), stamped via electron-builder extraMetadata.
on:
  workflow_dispatch:
    inputs:
      commit:
        description: Full SHA of the commit to build (defaults to the branch head)
        required: false
        type: string

permissions:
  contents: read

jobs:
  installers:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.commit || github.ref }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - name: Derive the build version from the commit
        id: version
        shell: bash
        run: echo "version=0.0.0-$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"
      - run: npm ci
      - run: npm run build
      - run: npm run dist --workspace @open-northland/desktop -- --config.extraMetadata.version=${{ steps.version.outputs.version }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: installers-${{ runner.os }}
          path: |
            packages/desktop/release/*.exe
            packages/desktop/release/*.dmg
            packages/desktop/release/*.AppImage
          if-no-files-found: error

  publish:
    needs: installers
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.commit || github.ref }}
          fetch-depth: 0
      - name: Refuse to publish a commit that is not on main
        # The `commit` input could otherwise tag any object in the repo network (including fork-PR
        # heads) as an official-looking prerelease. Loosen deliberately when stable branches ship.
        run: git merge-base --is-ancestor "$(git rev-parse HEAD)" origin/main
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: installers
          merge-multiple: true
      - name: Publish the build-<short-sha> prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha="$(git rev-parse HEAD)"
          short="$(git rev-parse --short=7 HEAD)"
          tag="build-$short"
          # Re-dispatching the same commit replaces that build's assets instead of failing.
          if gh release view "$tag" --json tagName --jq .tagName >/dev/null 2>&1; then
            gh release upload "$tag" installers/* --clobber
          else
            # Quoted heredoc + sed keeps the markdown literal (backticks, fences) with only the
            # sha substituted.
            sed "s/@SHA@/$sha/" > notes.md <<'EOF'
          Unsigned development build of commit @SHA@ — code signing is tracked in docs/tickets/tooling/desktop-code-signing.md.

          - **Windows:** SmartScreen warns about an unknown publisher; choose "More info" → "Run anyway".
          - **macOS:** Gatekeeper refuses to open the unsigned app — on Apple Silicon as a misleading "damaged, move to Trash" dialog. The app is fine; after copying OpenNorthland.app to Applications, clear the download quarantine flag and launch again:

            ```sh
            xattr -cr /Applications/OpenNorthland.app
            ```
          EOF
            gh release create "$tag" installers/* \
              --prerelease \
              --target "$sha" \
              --title "Dev build $short" \
              --notes-file notes.md
          fi
          url="$(gh release view "$tag" --json url --jq .url)"
          echo "Download page: $url" >> "$GITHUB_STEP_SUMMARY"

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Northland</title>
    <link rel="stylesheet" href="setup.css" />
  </head>
  <body>
    <!-- All user-facing copy is filled from the i18n catalog by setup.ts; the markup carries ids only. -->
    <main class="card">
      <div class="header">
        <h1>Open Northland</h1>
        <div id="lang-switch" class="lang-switch"></div>
      </div>
      <p class="intro" id="intro"></p>

      <section id="pick" class="phase">
        <p id="status-note" class="note hidden"></p>
        <div class="pick-row">
          <input id="game-path" type="text" spellcheck="false" />
          <button id="browse" type="button"></button>
        </div>
        <p id="probe-note" class="note"></p>
        <div id="mod-panel" class="mod-panel hidden">
          <p class="note" id="mod-required-note"></p>
          <div class="actions">
            <button id="mod-download" type="button" class="primary"></button>
            <button id="mod-pick" type="button"></button>
          </div>
          <div id="mod-progress" class="hidden">
            <div class="bar"><div id="mod-bar-fill" class="bar-fill"></div></div>
            <p class="status-row"><span id="mod-stage"></span><span id="mod-count"></span></p>
            <div class="actions"><button id="mod-cancel" type="button"></button></div>
          </div>
          <p id="mod-note" class="note"></p>
        </div>
        <div id="detected" class="detected hidden">
          <p class="note" id="detected-label"></p>
          <div id="detected-list"></div>
        </div>
        <div class="actions">
          <button id="install" type="button" class="primary" disabled></button>
          <button id="play-now" type="button" class="hidden"></button>
        </div>
      </section>

      <section id="run" class="phase hidden">
        <div class="bar"><div id="bar-fill" class="bar-fill"></div></div>
        <p class="status-row"><span id="stage-label"></span><span id="item-count"></span></p>
        <pre id="log-tail" class="log"></pre>
        <div class="actions">
          <button id="cancel" type="button"></button>
        </div>
      </section>

      <section id="done" class="phase hidden">
        <p class="ok" id="done-ok"></p>
        <button id="play" type="button" class="primary"></button>
      </section>

      <section id="failed" class="phase hidden">
        <p class="error" id="error-message"></p>
        <pre id="error-log" class="log"></pre>
        <button id="retry" type="button"></button>
      </section>

      <p class="legal" id="legal"></p>
    </main>
    <script src="setup.js"></script>
  </body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="OpenNorthland">
  <rect width="32" height="32" rx="6" fill="#1a1410"/>
  <!-- square sail with the classic Nordic red stripes -->
  <g stroke="#c9a15a" stroke-width="1.4" stroke-linecap="round">
    <path d="M16 5.5 V20" fill="none"/>
  </g>
  <path d="M8.5 8.5 H23.5 V17.5 H8.5 Z" fill="#e8dcc0"/>
  <path d="M11 8.5 H13 V17.5 H11 Z M19 8.5 H21 V17.5 H19 Z" fill="#a8402f"/>
  <!-- hull: a curved longship with an upcurling dragon prow -->
  <path d="M5 21 Q16 27 27 21 Q26 24 24.5 24.5 Q17 27 8 24.5 Q6.5 24 5 21 Z" fill="#8a5a2b"/>
  <path d="M27 21 q2.5 -1.5 1.5 -4.5 q1.8 1.2 0.6 3.2 q1 -0.4 0.9 -1.8" fill="none" stroke="#c9a15a" stroke-width="1.3" stroke-linecap="round"/>
  <!-- shield row on the hull -->
  <g fill="#c9a15a">
    <circle cx="10.5" cy="22.6" r="1.1"/>
    <circle cx="14.5" cy="23.2" r="1.1"/>
    <circle cx="18.5" cy="23.2" r="1.1"/>
    <circle cx="22.5" cy="22.6" r="1.1"/>
  </g>
</svg>
